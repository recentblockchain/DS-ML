name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare site
        shell: bash
        run: |
          set -euo pipefail
          rm -rf site
          mkdir -p site

          # Publish the interactive HTML pages as the site root
          cp -a "Interactive Pages/." site/

          # This index page loads this JSX file via fetch()
          cp -a feature_engineering_interactive.jsx site/

          # Avoid Jekyll processing
          touch site/.nojekyll

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: site
          publish_branch: gh-pages
